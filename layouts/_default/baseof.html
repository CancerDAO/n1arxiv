<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 760px; margin: 0 auto; padding: 1.5rem; line-height: 1.55; }
    header.site-header, footer.site-footer { border-bottom: 1px solid #ccc; padding-bottom: .75rem; margin-bottom: 1.5rem; }
    footer.site-footer { border-top: 1px solid #ccc; border-bottom: none; padding-top: .75rem; margin-top: 2rem; margin-bottom: 0; font-size: .9rem; color: #666; }
    .site-banner { background: #fff4e6; border-left: 4px solid #ff8c00; padding: .5rem .75rem; margin-bottom: 1rem; font-weight: bold; }
    .banner { background: #fff4e6; border-left: 4px solid #ff8c00; padding: .5rem .75rem; margin: .75rem 0; font-weight: bold; }
    .banner-inline { font-size: .85rem; padding: .25rem .5rem; }
    .paper-meta { font-size: .9rem; color: #555; margin-top: .5rem; }
    .paper-meta .meta-item { display: inline-block; margin-right: 1rem; }
    .paper-list { list-style: none; padding: 0; }
    .paper-list-item { border-bottom: 1px solid #eee; padding: .75rem 0; }
    .paper-link { font-weight: 600; text-decoration: none; }
    .paper-list-meta { font-size: .85rem; color: #777; margin-top: .25rem; }
    .caveat { font-size: .9rem; color: #444; background: #f7f7f7; padding: .75rem; border-radius: 4px; }
    .citation-block { font-size: .85rem; color: #555; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; }
    @media (prefers-color-scheme: dark) {
      body { background: #1b1b1b; color: #e6e6e6; }
      header.site-header, footer.site-footer { border-color: #333; }
      .site-banner, .banner { background: #2a1f12; border-color: #ff8c00; }
      .caveat { background: #222; color: #ddd; }
      .paper-list-item { border-color: #2a2a2a; }
      .paper-meta { color: #aaa; }
      .paper-list-meta { color: #888; }
      a { color: #6cb6ff; }
    }
  </style>
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
