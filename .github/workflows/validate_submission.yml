name: validate_submission

on:
  pull_request:
    paths:
      - "static/bundles/**"
      - "content/papers/**"
      - "schemas/**"
      - "scripts/validate_bundle.py"
      - ".github/workflows/validate_submission.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Detect submitted bundles
        id: bundles
        run: |
          set -euo pipefail
          # Find all .n1a.zip files under static/bundles/ that are part of
          # this PR. We diff against the base ref so renames/edits are
          # caught too.
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch origin "$BASE_SHA" --depth=1 || true
          mapfile -t BUNDLES < <(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- 'static/bundles/*.n1a.zip' || true)
          echo "Submitted bundles: ${BUNDLES[*]:-<none>}"
          # Persist for later step
          printf '%s\n' "${BUNDLES[@]}" > .submitted_bundles.txt

      - name: Validate every submitted bundle
        run: |
          set -euo pipefail
          FAIL=0
          while read -r b; do
            [ -z "$b" ] && continue
            echo "::group::Validating $b"
            if python scripts/validate_bundle.py "$b"; then
              echo "PASS: $b"
            else
              echo "::error file=$b::bundle refused by validator"
              FAIL=1
            fi
            echo "::endgroup::"
          done < .submitted_bundles.txt
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more bundles failed validation. See output above."
            exit 1
          fi
